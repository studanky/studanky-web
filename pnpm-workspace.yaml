# Approve build (postinstall) scripts for trusted native dependencies.
# pnpm v10+ does not run dependency build scripts unless listed here (security).
# `allowBuilds` is a map of package -> boolean (pnpm v11 replaced the older
# `onlyBuiltDependencies` / `ignoredBuiltDependencies` arrays). See:
# https://pnpm.io/settings#allowbuilds
allowBuilds:
  sharp: true # native libvips bindings; used by next/image optimization
  unrs-resolver: true # native resolver used by ESLint import resolution
